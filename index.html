<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7th Heaven</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>7th Heaven</h1>
</header>

<!-- HERO -->

<section class="panel hero">
  <h2>Luxury Dining Redefined</h2>
</section>

<!-- SECTION 1 -->

<section class="panel image-section">
  <div class="text">
    <h2>Experience Elegance</h2>
    <p>Step into a world of refined taste and luxury ambience.</p>
  </div>
  <div class="image">
    <img src="https://picsum.photos/800/600">
  </div>
</section>

<!-- SECTION 2 -->

<section class="panel image-section reverse">
  <div class="image">
    <img src="https://picsum.photos/801/600">
  </div>
  <div class="text">
    <h2>Crafted Cuisine</h2>
    <p>Every dish is a masterpiece of flavor and presentation.</p>
  </div>
</section>

<!-- FULL IMAGE -->

<section class="panel full-image">
  <h2>Unforgettable Moments</h2>
</section>

<!-- CONTACT -->

<section class="panel contact">
  <h2>Contact Us</h2>
  <form id="contactForm">
    <input type="text" placeholder="Name" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<script src="script.js"></script>

</body>
</html>
